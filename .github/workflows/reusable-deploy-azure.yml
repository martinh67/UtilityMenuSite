name: Deploy to Azure App Service (reusable)

# OIDC federated auth — no long-lived secrets. The caller workflow needs
# `permissions: id-token: write` so this reusable can request the token.
# `vars.AZURE_CLIENT_ID` etc. are configured per GitHub environment and
# point at the env-specific app registration that has a federated credential
# matching `repo:owner/repo:environment:<env>`. See UtilityMenuInfra readme
# for the deployer-SP setup.

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      app-name:
        required: true
        type: string
      artifact-name:
        required: false
        default: 'app'
        type: string
      slot:
        required: false
        default: 'production'
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
          path: ./publish

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ inputs.app-name }}
          slot-name: ${{ inputs.slot }}
          package: ./publish

      - name: Azure logout
        if: always()
        run: az logout
