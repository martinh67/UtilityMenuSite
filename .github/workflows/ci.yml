name: CI

on:
  pull_request:
    branches: [ main, develop ]
    paths-ignore:
      - '**.md'
      - 'wwwroot/docs/**'
      - 'wwwroot/css/**'
      - 'wwwroot/js/**'
      - 'LICENSE'

# Note: no `push:` trigger here. Push events go to deploy-dev / deploy-uat /
# deploy-prod, each of which runs build + test inline as part of the deploy
# pipeline. CI fires only on PR — that's the single test gate before merge.
# Mirrors InkyAPI's posture; halves Actions minutes on feature-branch pushes.

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    uses: ./.github/workflows/reusable-build.yml
    with:
      configuration: Release
      artifact-name: app-ci

  test:
    needs: build
    uses: ./.github/workflows/reusable-test.yml
    with:
      configuration: Release
      artifact-name: app-ci
      test-results-name: test-results-ci
      retention-days: 1
