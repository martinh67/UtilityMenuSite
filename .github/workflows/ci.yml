name: CI

on:
  pull_request:
    branches: [ main, develop ]
    paths-ignore:
      - '**.md'
      - 'wwwroot/docs/**'
      - 'wwwroot/css/**'
      - 'wwwroot/js/**'
      - 'LICENSE'

# Note: no `push:` trigger here. Push events go to deploy-dev / deploy-uat /
# deploy-prod which build and deploy. CI runs only on PR.
#
# Site is a thin BFF — UtilityMenuAPI owns the database, JWT issuance and
# migrations. The Site test project covers Blazor component behaviour
# against a mocked IUtilityMenuApiClient (bUnit).

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    uses: ./.github/workflows/reusable-build.yml
    with:
      configuration: Release
      artifact-name: app-ci

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-dotnet
      - name: Test
        run: dotnet test UtilityMenuSite.Tests/UtilityMenuSite.Tests.csproj -c Release --logger trx --results-directory ./test-results
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-ci
          path: ./test-results
          retention-days: 14
