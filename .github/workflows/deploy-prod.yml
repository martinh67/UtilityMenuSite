name: Deploy — Production

# Site is now a thin BFF: no test project, no migrations. Build → deploy.
# All data + auth go via UtilityMenuAPI.

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'wwwroot/docs/**'
      - 'wwwroot/css/**'
      - 'wwwroot/js/**'
      - 'LICENSE'
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy" to confirm production deployment'
        required: true
        type: string

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  build:
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.confirm == 'deploy')
    uses: ./.github/workflows/reusable-build.yml
    with:
      configuration: Release
      publish: true
      artifact-name: app-prod
      retention-days: 14

  deploy:
    needs: build
    uses: ./.github/workflows/reusable-deploy-azure.yml
    with:
      environment: Production
      app-name: utilitymenu-prod-site
      artifact-name: app-prod
    secrets:
      azure-credentials: ${{ secrets.PROD_AZURE_CREDENTIALS }}

  notify:
    needs: deploy
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Deployment summary
        run: |
          echo "Production deployment ${{ needs.deploy.result }} at $(date -u)"
          echo "Ref: ${{ github.ref_name }}"
          echo "Triggered by: ${{ github.actor }}"
