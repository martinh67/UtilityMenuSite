name: Deploy — Production

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'wwwroot/docs/**'
      - 'wwwroot/css/**'
      - 'wwwroot/js/**'
      - 'LICENSE'
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy" to confirm production deployment'
        required: true
        type: string

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  build:
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.confirm == 'deploy')
    uses: ./.github/workflows/reusable-build.yml
    with:
      configuration: Release
      publish: true
      artifact-name: app-prod
      retention-days: 14

  test:
    needs: build
    uses: ./.github/workflows/reusable-test.yml
    with:
      artifact-name: app-prod
      test-results-name: test-results-prod
      retention-days: 14

  migrate:
    needs: test
    uses: ./.github/workflows/reusable-migrate.yml
    with:
      environment: Production
      artifact-name: app-prod
    secrets:
      connection-string: ${{ secrets.PROD_CONNECTION_STRING }}

  deploy:
    needs: migrate
    uses: ./.github/workflows/reusable-deploy-azure.yml
    with:
      environment: Production
      app-name: utilitymenu-prod
      artifact-name: app-prod
    secrets:
      azure-credentials: ${{ secrets.PROD_AZURE_CREDENTIALS }}

  notify:
    needs: deploy
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Deployment summary
        run: |
          echo "Production deployment ${{ needs.deploy.result }} at $(date -u)"
          echo "Ref: ${{ github.ref_name }}"
          echo "Triggered by: ${{ github.actor }}"
