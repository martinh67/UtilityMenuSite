name: Deploy — Production

# Site is now a thin BFF: no test project, no migrations. Build → deploy.
# All data + auth go via UtilityMenuAPI.

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'wwwroot/docs/**'
      - 'wwwroot/css/**'
      - 'wwwroot/js/**'
      - 'LICENSE'
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy" to confirm production deployment'
        required: true
        type: string

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  build:
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.confirm == 'deploy')
    uses: ./.github/workflows/reusable-build.yml
    with:
      configuration: Release
      publish: true
      artifact-name: app-prod
      retention-days: 14

  # Pre-launch direct deploy (cost audit 2026-07-02): the prod plan is B1
  # with no staging slot (UtilityMenuInfra#15 — P1v3 → B1, slots off, zero
  # customers), so we deploy straight to the production slot. The
  # staging → smoke → swap pipeline this replaces lives in git history;
  # restore it (git revert this commit) when launch prep restores P1v3 +
  # slots.
  deploy-production:
    needs: build
    uses: ./.github/workflows/reusable-deploy-azure.yml
    with:
      environment: Production
      app-name: utilitymenu-prod-site
      artifact-name: app-prod

  # Smoke the production hostname after deploy. With no staging slot there
  # is no instant swap-back; rollback is redeploying the previous commit
  # via workflow_dispatch. Acceptable while the app has no users.
  smoke-production:
    needs: deploy-production
    runs-on: ubuntu-latest
    steps:
      - name: Probe production /health
        run: |
          set -u
          URL="https://utilitymenu-prod-site.azurewebsites.net/health"
          for attempt in 1 2 3 4; do
            code=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 45 "$URL" || echo "000")
            if [ "$code" = "200" ]; then
              echo "[OK] production /health returned $code (attempt $attempt)"
              exit 0
            fi
            if [ "$attempt" -lt 4 ]; then
              echo "[INFO] production /health returned $code on attempt $attempt; retrying in 10s"
              sleep 10
            fi
          done
          echo "[FAIL] production /health did not return 200 after deploy"
          echo "[FAIL] Rollback: re-run this workflow (workflow_dispatch) from the previous good commit"
          exit 1

  notify:
    needs: smoke-production
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Deployment summary
        run: |
          echo "Production deployment ${{ needs.smoke-production.result }} at $(date -u)"
          echo "Ref: ${{ github.ref_name }}"
          echo "Triggered by: ${{ github.actor }}"
