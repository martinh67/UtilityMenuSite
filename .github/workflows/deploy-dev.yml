name: Deploy — Dev

# Site is now a thin BFF: no test project, no migrations. Build → deploy.
# All data + auth go via UtilityMenuAPI; the API repo runs its own tests +
# migrations as part of its deploy chain.

on:
  push:
    branches:
      - 'feature/**'
      - 'claude/**'
      - 'copilot/**'
    paths-ignore:
      - '**.md'
      - 'wwwroot/docs/**'
      - 'wwwroot/css/**'
      - 'wwwroot/js/**'
      - 'LICENSE'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-dev-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    uses: ./.github/workflows/reusable-build.yml
    with:
      configuration: Release
      publish: true
      artifact-name: app-dev
      retention-days: 1

  deploy:
    needs: build
    uses: ./.github/workflows/reusable-deploy-azure.yml
    with:
      environment: Dev
      app-name: utilitymenu-dev-site
      artifact-name: app-dev
