name: Deploy — Dev

on:
  push:
    branches:
      - 'feature/**'
      - 'claude/**'
      - 'copilot/**'
    paths-ignore:
      - '**.md'
      - 'wwwroot/docs/**'
      - 'wwwroot/css/**'
      - 'wwwroot/js/**'
      - 'LICENSE'
  workflow_dispatch:

concurrency:
  group: deploy-dev-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    uses: ./.github/workflows/reusable-build.yml
    with:
      configuration: Release
      publish: true
      artifact-name: app-dev
      retention-days: 1

  test:
    needs: build
    uses: ./.github/workflows/reusable-test.yml
    with:
      artifact-name: app-dev
      test-results-name: test-results-dev
      retention-days: 1

  migrate:
    needs: test
    uses: ./.github/workflows/reusable-migrate.yml
    with:
      environment: Dev
      artifact-name: app-dev
    secrets:
      connection-string: ${{ secrets.DEV_CONNECTION_STRING }}

  deploy:
    needs: migrate
    uses: ./.github/workflows/reusable-deploy-azure.yml
    with:
      environment: Dev
      app-name: utilitymenu-dev
      artifact-name: app-dev
    secrets:
      azure-credentials: ${{ secrets.DEV_AZURE_CREDENTIALS }}
