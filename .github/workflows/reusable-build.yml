name: Build (reusable)

on:
  workflow_call:
    inputs:
      configuration:
        description: 'Build configuration'
        required: false
        default: 'Release'
        type: string
      publish:
        description: 'Also run dotnet publish for deployment'
        required: false
        default: false
        type: boolean
      artifact-name:
        description: 'Artifact name prefix'
        required: false
        default: 'app'
        type: string
      retention-days:
        description: 'Days to retain the publish artifact (dev=1, uat=7, prod=14)'
        required: false
        default: 7
        type: number

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-dotnet

      - name: Build
        run: dotnet build --no-restore -c ${{ inputs.configuration }}

      # Always upload build output so test/migrate jobs can reuse it
      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}-build
          path: |
            **/bin/${{ inputs.configuration }}
            **/obj/${{ inputs.configuration }}
          retention-days: 1

      - name: Publish
        if: ${{ inputs.publish }}
        run: |
          dotnet publish UtilityMenuSite.csproj \
            --no-build \
            -c ${{ inputs.configuration }} \
            -o ./publish

      - name: Upload publish artifact
        if: ${{ inputs.publish }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
          path: ./publish
          retention-days: ${{ inputs.retention-days }}
