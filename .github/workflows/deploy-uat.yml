name: Deploy — UAT

# Site is now a thin BFF: no test project, no migrations. Build → deploy.
# All data + auth go via UtilityMenuAPI.

on:
  push:
    branches: [ develop ]
    paths-ignore:
      - '**.md'
      - 'wwwroot/docs/**'
      - 'wwwroot/css/**'
      - 'wwwroot/js/**'
      - 'LICENSE'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-uat
  cancel-in-progress: false

jobs:
  build:
    uses: ./.github/workflows/reusable-build.yml
    with:
      configuration: Release
      publish: true
      artifact-name: app-uat
      retention-days: 7

  deploy:
    needs: build
    uses: ./.github/workflows/reusable-deploy-azure.yml
    with:
      environment: UAT
      app-name: utilitymenu-uat-site
      artifact-name: app-uat
