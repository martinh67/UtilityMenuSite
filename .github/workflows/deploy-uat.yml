name: Deploy — UAT

on:
  push:
    branches: [ develop ]
    paths-ignore:
      - '**.md'
      - 'wwwroot/docs/**'
      - 'wwwroot/css/**'
      - 'wwwroot/js/**'
      - 'LICENSE'
  workflow_dispatch:

concurrency:
  group: deploy-uat
  cancel-in-progress: false

jobs:
  build:
    uses: ./.github/workflows/reusable-build.yml
    with:
      configuration: Release
      publish: true
      artifact-name: app-uat
      retention-days: 7

  test:
    needs: build
    uses: ./.github/workflows/reusable-test.yml
    with:
      artifact-name: app-uat
      test-results-name: test-results-uat
      retention-days: 7

  migrate:
    needs: test
    uses: ./.github/workflows/reusable-migrate.yml
    with:
      environment: UAT
      artifact-name: app-uat
    secrets:
      connection-string: ${{ secrets.UAT_CONNECTION_STRING }}

  deploy:
    needs: migrate
    uses: ./.github/workflows/reusable-deploy-azure.yml
    with:
      environment: UAT
      app-name: utilitymenu-uat
      artifact-name: app-uat
    secrets:
      azure-credentials: ${{ secrets.UAT_AZURE_CREDENTIALS }}
