name: Test (reusable)

on:
  workflow_call:
    inputs:
      configuration:
        required: false
        default: 'Release'
        type: string
      artifact-name:
        description: 'Build artifact name prefix (must match reusable-build)'
        required: false
        default: 'app'
        type: string
      test-results-name:
        description: 'Unique name for test results artifact'
        required: false
        default: 'test-results'
        type: string
      retention-days:
        description: 'Days to retain test results artifact (dev=1, uat=7, prod=14)'
        required: false
        default: 7
        type: number
    outputs:
      test-passed:
        description: 'Whether all tests passed'
        value: ${{ jobs.test.outputs.passed }}

jobs:
  test:
    runs-on: ubuntu-latest
    outputs:
      passed: ${{ steps.run-tests.outcome == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-dotnet

      - name: Download build output
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}-build
          path: .

      - name: Run tests
        id: run-tests
        run: |
          dotnet test \
            --no-build \
            -c ${{ inputs.configuration }} \
            --logger "trx;LogFileName=test-results.trx" \
            --results-directory ./test-results \
            /p:CollectCoverage=true \
            /p:CoverletOutputFormat=opencover \
            /p:CoverletOutput=./test-results/coverage.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.test-results-name }}
          path: ./test-results
          retention-days: ${{ inputs.retention-days }}
