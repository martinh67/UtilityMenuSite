name: Database Migration (reusable)

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      artifact-name:
        description: 'Build artifact name prefix (must match reusable-build)'
        required: false
        default: 'app'
        type: string
    secrets:
      connection-string:
        required: true

jobs:
  migrate:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-dotnet

      - uses: ./.github/actions/setup-ef

      - name: Download build output
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}-build
          path: .

      - name: Run EF migrations
        env:
          ConnectionStrings__DefaultConnection: ${{ secrets.connection-string }}
        run: |
          dotnet ef database update \
            --no-build \
            --project UtilityMenuSite.csproj \
            --configuration Release \
            -- --environment ${{ inputs.environment }}
